<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paypers</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Onboarding -->
    <section id="onboarding" class="view active">
      <div class="onboarding-content">
        <h1>Paypers</h1>
        <p class="subtitle">Discover biomedical research tailored to you.</p>

        <div class="section">
          <h2>What are you interested in?</h2>
          <div class="keyword-input-wrap">
            <input type="text" id="keyword-input" placeholder="Type a keyword and press Enter" maxlength="40" autocomplete="off" />
            <button id="add-keyword">Add</button>
          </div>
          <div id="selected-keywords" class="keywords-list"></div>
          <p id="keyword-limit" class="hint hidden">You can add up to 5 keywords.</p>
        </div>

        <div class="section">
          <h3>Or pick from hot topics</h3>
          <div id="topic-pills" class="pills"></div>
        </div>

        <button id="start-btn" class="primary-btn" disabled>Start Discovering</button>
      </div>
    </section>

    <!-- Main App -->
    <section id="main" class="view">
      <header class="top-bar">
        <div class="logo">Paypers</div>
        <div class="top-bar-actions">
          <div id="stats-bar" class="stats-bar"></div>
          <button id="settings-btn" class="dark-toggle" title="Settings" aria-label="Settings">⚙</button>
          <button id="dark-toggle" class="dark-toggle" title="Toggle dark mode">☾</button>
        </div>
      </header>

      <!-- Digest Banner -->
      <div id="digest-banner" class="digest-banner hidden"></div>

      <div class="main-body">
        <!-- Swipe Tab -->
        <div id="tab-swipe" class="tab-content active">
          <div class="card-area">
            <div id="card-stack" class="card-stack">
              <div id="empty-state" class="empty-state hidden">
                <div class="loading-spinner"></div>
                <p id="empty-state-msg">Loading more papers…</p>
                <button id="retry-btn" class="retry-btn hidden">Retry</button>
              </div>
            </div>

            <div class="swipe-hints">
              <div class="hint left">
                <span class="arrow">&#8592;</span>
                <span>Not interested</span>
              </div>
              <button id="undo-swipe-btn" class="undo-swipe-btn hidden" title="Undo last swipe">&#8634; Undo</button>
              <div class="hint right">
                <span>Save &amp; boost</span>
                <span class="arrow">&#8594;</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Saved Tab -->
        <div id="tab-saved" class="tab-content">
          <div class="saved-header">
            <h2>Saved Papers</h2>
            <p id="saved-subtitle" class="saved-subtitle">No papers saved yet.</p>
            <div class="saved-header-row">
              <input type="text" id="saved-filter" class="saved-filter hidden" placeholder="Filter saved papers…" />
              <button id="undo-save-btn" class="undo-save-btn hidden">Undo last save</button>
            </div>
          </div>
          <div id="saved-list" class="saved-list"></div>
        </div>
      </div>

      <!-- Bottom Tabs -->
      <nav class="bottom-tabs">
        <button id="tab-btn-swipe" class="tab-btn active" data-tab="swipe">
          <span class="tab-icon">&#9673;</span>
          <span class="tab-label">Swipe</span>
        </button>
        <button id="tab-btn-saved" class="tab-btn" data-tab="saved">
          <span class="tab-icon">&#9733;</span>
          <span class="tab-label">Saved</span>
          <span id="saved-badge" class="tab-badge">0</span>
        </button>
      </nav>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
